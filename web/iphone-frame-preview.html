<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>iPhone Preview Frame</title>
<style>
    * { box-sizing: border-box; }
    html, body {
        margin: 0;
        min-height: 100%;
        background: #111417;
        color: #eef2f3;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
        display: grid;
        place-items: center;
        padding: 24px;
    }
    .phone {
        width: min(390px, 100vw - 24px);
        height: min(844px, 100vh - 48px);
        border: 10px solid #070809;
        border-radius: 36px;
        overflow: hidden;
        background: #f7f8f5;
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.42);
    }
    iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #f7f8f5;
    }
</style>
</head>
<body>
    <div class="phone">
        <iframe src="iphone-preview.html" title="Bible Gematria iPhone preview"></iframe>
    </div>
</body>
</html>
